<!DOCTYPE html>
<html>
<head>
    <title>Tırsan Treyler Takip Sistemi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        .leaflet-popup-content { font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        // Google Sheets CSV Linki (Senin linkin)
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK8xi20nITaCs3QGuv_2t_fFDahaSusi1EZk4eioJpfspoo57yCDhD2XgJVEvJir56J4awAlJXae_I/pub?output=csv';

        const map = L.map('map').setView([48.0, 10.0], 5); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Şık bir Treyler İkonu
        const trailerIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3063/3063822.png', 
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            popupAnchor: [0, -20]
        });

        function loadData() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    // Temizlik
                    map.eachLayer((layer) => {
                        if (layer instanceof L.Marker || layer instanceof L.Polyline) {
                            map.removeLayer(layer);
                        }
                    });

                    results.data.forEach(row => {
                        // Sütun isimlerini senin Sheets'e göre eşitledik
                        const lat = parseFloat(row["ENLEM"]);
                        const lng = parseFloat(row["BOYLAM"]);
                        const targetLat = parseFloat(row["VARIS ENLEM"]); 
                        const targetLng = parseFloat(row["VARIS BOYLAM"]);
                        const durum = row["DURUM"] ? row["DURUM"].trim().toUpperCase() : "";

                        if (!isNaN(lat) && !isNaN(lng) && durum !== "VARDI") {
                            
                            // 1. Araç Markerı
                            const marker = L.marker([lat, lng], {icon: trailerIcon}).addTo(map);
                            marker.bindPopup(`
                                <div style="color:#0054a6; font-weight:bold; border-bottom:1px solid #ccc; margin-bottom:5px;">TIRSAN LOJİSTİK TAKİP</div>
                                <b>Şasi:</b> ${row["ŞASİ NUMARASI"] || '-'}<br>
                                <b>Yürüyen:</b> ${row["YÜRÜYEN"] || '-'}<br>
                                <b>Mevcut:</b> ${row["GÜNCEL KONUM"] || '-'}<br>
                                <b>Hedef:</b> ${row["VARIŞ LOKASYONU"] || '-'}<br>
                                <b>Durum:</b> <span style="color:red">${durum}</span>
                            `);

                            // 2. Hedefe Giden Mavi Ok/Çizgi
                            if (!isNaN(targetLat) && !isNaN(targetLng)) {
                                // Rota Çizgisi
                                L.polyline([[lat, lng], [targetLat, targetLng]], {
                                    color: '#0054a6',
                                    weight: 3,
                                    opacity: 0.6,
                                    dashArray: '10, 10'
                                }).addTo(map);

                                // Varış Noktasına Küçük Bir İşaret
                                L.circleMarker([targetLat, targetLng], {
                                    radius: 5,
                                    color: 'red',
                                    fillColor: 'red',
                                    fillOpacity: 1
                                }).addTo(map).bindPopup("Varış Noktası: " + row["VARIŞ LOKASYONU"]);
                            }
                        }
                    });
                }
            });
        }

        loadData();
        setInterval(loadData, 30000); // 30 saniyede bir güncelle
    </script>
</body>
</html>
