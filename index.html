<!DOCTYPE html>
<html>
<head>
    <title>Tırsan Treyler Takip Sistemi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        /* Pop-up pencerelerini biraz daha profesyonel gösterelim */
        .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 3px 14px rgba(0,0,0,0.4); }
        .leaflet-popup-content { font-size: 14px; line-height: 1.6; padding: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        // --- AYAR: Google Sheets Yayın Linkin (csv formatında) ---
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK8xi20nITaCs3QGuv_2t_fFDahaSusi1EZk4eioJpfspoo57yCDhD2XgJVEvJir56J4awAlJXae_I/pub?output=csv';

        const map = L.map('map').setView([48.0, 10.0], 5); // Avrupa merkezli başlangıç
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- YENİ: Şık Yan Profil Treyler İkonu ---
        const trailerIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3063/3063822.png', // Yan profil treyler
            iconSize: [45, 45], // Boyut
            iconAnchor: [22, 22], // Merkezleme
            popupAnchor: [0, -20] // Pop-up konumu
        });

        function loadData() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    // Haritayı temizle
                    map.eachLayer((layer) => {
                        if (layer instanceof L.Marker || layer instanceof L.Polyline || layer instanceof L.CircleMarker) {
                            map.removeLayer(layer);
                        }
                    });

                    results.data.forEach(row => {
                        // Sütun isimlerini Sheets'tekiyle (resimdekiyle) birebir eşitledik
                        const lat = parseFloat(row["ENLEM"]);
                        const lng = parseFloat(row["BOYLAM"]);
                        const targetLat = parseFloat(row["VARİŞ ENLEM"]); 
                        const targetLng = parseFloat(row["VARİŞ BOYLAM"]);
                        const durum = row["DURUM"] ? row["DURUM"].trim().toUpperCase() : "";

                        // Sadece "VARDI" olmayanları göster
                        if (!isNaN(lat) && !isNaN(lng) && durum !== "VARDI") {
                            
                            // 1. Araç İkonu (Treyler Resmi ile)
                            const marker = L.marker([lat, lng], {icon: trailerIcon}).addTo(map);
                            marker.bindPopup(`
                                <div style="color:#0054a6; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:5px; margin-bottom:5px;">TIRSAN ARAÇ TAKİP</div>
                                <b>Şasi:</b> ${row["ŞASİ NUMARASI"] || '-'}<br>
                                <b>Yürüyen:</b> ${row["YÜRÜYEN"] || '-'}<br>
                                <b>Mevcut:</b> ${row["GÜNCEL KONUM"] || '-'}<br>
                                <b>Hedef:</b> ${row["VARIŞ LOKASYONU"] || '-'}<br>
                                <b>Durum:</b> <span style="color: #d9534f; font-weight:bold;">${durum}</span>
                            `);

                            // 2. Hedefe Mavi Kesikli Çizgi
                            if (!isNaN(targetLat) && !isNaN(targetLng)) {
                                L.polyline([[lat, lng], [targetLat, targetLng]], {
                                    color: '#0054a6', // Tırsan Mavisi
                                    weight: 3,
                                    opacity: 0.6,
                                    dashArray: '10, 10' // Kesikli çizgi
                                }).addTo(map);

                                // Varış Noktasına Kırmızı Hedef Noktası
                                L.circleMarker([targetLat, targetLng], {
                                    radius: 6,
                                    color: 'red',
                                    fillColor: 'red',
                                    fillOpacity: 1
                                }).addTo(map).bindPopup("Varış Noktası: " + (row["VARIŞ LOKASYONU"] || 'Bilinmiyor'));
                            }
                        }
                    });
                }
            });
        }

        loadData();
        setInterval(loadData, 60000); // 60 saniyede bir veriyi yenile
    </script>
</body>
</html>
