<!DOCTYPE html>
<html>
<head>
    <title>Tırsan Treyler Takip Sistemi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; background: #f8f9fa; }
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK8xi20nITaCs3QGuv_2t_fFDahaSusi1EZk4eioJpfspoo57yCDhD2XgJVEvJir56J4awAlJXae_I/pub?output=csv';

        const map = L.map('map').setView([48.0, 10.0], 5); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // YENİ TREYLER SİMGESİ (Mavi ve Net)
        const trailerIcon = L.icon({
            iconUrl: 'https://img.icons8.com/ios-filled/100/0054a6/semi-truck.png', 
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            popupAnchor: [0, -15]
        });

        function loadData() {
            // Tarayıcı önbelleğini aşmak için linkin sonuna rastgele sayı ekliyoruz
            const finalUrl = sheetUrl + '&cache=' + Math.random();

            Papa.parse(finalUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    map.eachLayer((layer) => {
                        if (layer instanceof L.Marker || layer instanceof L.Polyline || layer instanceof L.CircleMarker) {
                            map.removeLayer(layer);
                        }
                    });

                    results.data.forEach(row => {
                        const lat = parseFloat(row["ENLEM"]);
                        const lng = parseFloat(row["BOYLAM"]);
                        
                        // Sütun isimlerini hem İ hem I harfiyle kontrol eden garanti yöntem:
                        const targetLat = parseFloat(row["VARİŞ ENLEM"] || row["VARIS ENLEM"]);
                        const targetLng = parseFloat(row["VARİŞ BOYLAM"] || row["VARIS BOYLAM"]);
                        
                        const durum = row["DURUM"] ? row["DURUM"].trim().toUpperCase() : "";

                        if (!isNaN(lat) && !isNaN(lng) && durum !== "VARDI") {
                            
                            // 1. Treyler Simgesini Ekle
                            L.marker([lat, lng], {icon: trailerIcon}).addTo(map)
                             .bindPopup(`<b>Şasi:</b> ${row["ŞASİ NUMARASI"]}<br><b>Hedef:</b> ${row["VARIŞ LOKASYONU"]}<br><b>Durum:</b> ${durum}`);

                            // 2. Çizgileri Geri Getir
                            if (!isNaN(targetLat) && !isNaN(targetLng)) {
                                L.polyline([[lat, lng], [targetLat, targetLng]], {
                                    color: '#0054a6',
                                    weight: 3,
                                    opacity: 0.6,
                                    dashArray: '8, 12'
                                }).addTo(map);

                                L.circleMarker([targetLat, targetLng], {radius: 5, color: 'red'}).addTo(map);
                            }
                        }
                    });
                }
            });
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
